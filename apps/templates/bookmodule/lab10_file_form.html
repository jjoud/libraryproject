{% extends "layouts/base.html" %}

{% block title %}{{ title }}{% endblock title %}

{% block content %}
<h1>{{ title }}</h1>

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">{{ button_text }}</button>
</form>

<p><a href="javascript:history.back()">Back</a></p>
{% endblock content %}
